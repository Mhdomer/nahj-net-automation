- name: Configure routing and retrieve device info
  hosts: routers
  gather_facts: no
  vars_files:
    - ../vars/vault.yml

  tasks:
    - name: Set description on Loopback0 (LAN1)
      cisco.ios.ios_config:
        lines:
          - description Nahj LAN1 - Managed by Ansible
        parents: interface Loopback0

    - name: Set description on Loopback1 (LAN2)
      cisco.ios.ios_config:
        lines:
          - description Nahj LAN2 - Managed by Ansible
        parents: interface Loopback1

    - name: Add static route from LAN1 to LAN2
      cisco.ios.ios_config:
        lines:
          - ip route 192.168.20.0 255.255.255.0 192.168.10.1
          
    - name: Retrieve running configuration
      cisco.ios.ios_command:
        commands:
          - show running-config
          - show version
          - show ip interface brief
      register: device_info

    - name: Display device information
      debug:
        msg: "{{ device_info.stdout_lines }}"
